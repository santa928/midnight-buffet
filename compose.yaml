x-web-base: &web-base
  build: .
  working_dir: /app
  volumes:
    - .:/app
    - node_modules:/app/node_modules
  environment:
    - CHOKIDAR_USEPOLLING=true
  command: npm run dev -- --host 0.0.0.0

services:
  web:
    <<: *web-base
    build: .
    ports:
      - "5173:5173"

  web-internal:
    <<: *web-base

  e2e:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    working_dir: /app
    depends_on:
      - web-internal
    volumes:
      - .:/app
      - e2e_node_modules:/app/node_modules
    environment:
      - PLAYWRIGHT_BASE_URL=http://web-internal:5173
    command: sh -c "npm ci && npm run test:e2e"

volumes:
  node_modules:
  e2e_node_modules:
